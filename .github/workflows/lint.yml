---
name: lint

on:
  push:
  pull_request:

jobs:
  ansible-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install dependencies
        run: cd ansible && uv sync

      - name: Install collections
        run: cd ansible && uv run ansible-galaxy collection install -r requirements.yml

      - name: Lint
        run: cd ansible && uv run ansible-lint
